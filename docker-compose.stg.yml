services:
  nginx:
    image: ghcr.io/kamiy2743/blog/nginx:stg
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /run/:rw,uid=101,gid=101,mode=0755
      - /var/cache/nginx/:rw,uid=101,gid=101,mode=0755
    networks:
      - private
    depends_on:
      - go
      - ssr
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:2026.2.0
    volumes:
      - ./cloudflared/config.stg.yml:/etc/cloudflared/config.yml:ro
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run --token-file /run/secrets/cloudflared_tunnel_token
    secrets:
      - cloudflared_tunnel_token
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    networks:
      - private
      - egress
    depends_on:
      - nginx
    restart: unless-stopped

  go:
    image: ghcr.io/kamiy2743/blog/go:stg
    env_file: ./backend/.env.stg
    secrets:
      - mysql_user
      - mysql_user_password
      - admin_basic_auth_user
      - admin_basic_auth_pass
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    networks:
      - private
    depends_on:
      - mysql
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/mysql_root_password
      MYSQL_USER_FILE: /run/secrets/mysql_user
      MYSQL_PASSWORD_FILE: /run/secrets/mysql_user_password
      MYSQL_DATABASE: blog
    command: ["mysqld", "--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    secrets:
      - mysql_root_password
      - mysql_user
      - mysql_user_password
    security_opt:
      - no-new-privileges:true
    volumes:
      - mysql_data:/var/lib/mysql/
    networks:
      - private
    restart: unless-stopped

  ssr:
    image: ghcr.io/kamiy2743/blog/ssr:stg
    env_file: ./frontend/.env
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    networks:
      - private
    restart: unless-stopped

networks:
  private:
    internal: true
  egress:

volumes:
  mysql_data:

secrets:
  cloudflared_tunnel_token:
    file: ./secrets/stg/cloudflared_tunnel_token
  admin_basic_auth_user:
    file: ./secrets/stg/admin_basic_auth_user
  admin_basic_auth_pass:
    file: ./secrets/stg/admin_basic_auth_pass
  mysql_root_password:
    file: ./secrets/stg/mysql_root_password
  mysql_user:
    file: ./secrets/stg/mysql_user
  mysql_user_password:
    file: ./secrets/stg/mysql_user_password
