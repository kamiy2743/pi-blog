include /etc/nginx/snippets/upstream.conf;

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 8000;

    set $csp_connect_src "'self' ws://localhost:8000";
    include /etc/nginx/snippets/header.conf;

    proxy_intercept_errors on;
    error_page 418 =500 /error;

    location = /error {
        proxy_pass http://vite-dev:5173/src/error/error.html;
        include /etc/nginx/snippets/proxy.conf;
    }

    location ~ ^/(@vite/|src/|node_modules/|__vite_ping$) {
        proxy_pass http://vite-dev:5173;
        include /etc/nginx/snippets/proxy.conf;
    }

    location ~* \.(png|jpe?g)$ {
        proxy_pass http://vite-dev:5173;
        include /etc/nginx/snippets/proxy.conf;
    }

    location /__vite_ws {
        proxy_pass http://vite-dev:5173;
        include /etc/nginx/snippets/proxy.conf;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location / {
        proxy_pass http://go;
        include /etc/nginx/snippets/proxy.conf;
    }
}
