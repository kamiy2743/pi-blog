services:
  nginx:
    image: nginx:1.27-alpine
    user: "nginx:nginx"
    volumes:
      - ./nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/snippets/:/etc/nginx/snippets/:ro
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /run/:rw,uid=101,gid=101,mode=0755
      - /var/cache/nginx/:rw,uid=101,gid=101,mode=0755
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - private
      - egress
    depends_on:
      - go
      - vite-dev
    restart: unless-stopped

  go:
    build:
      context: ./backend/
      dockerfile: ./Dockerfile.app
    env_file: ./backend/.env.dev
    secrets:
      - mysql_user
      - mysql_user_password
      - admin_basic_auth_user
      - admin_basic_auth_pass
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    networks:
      - private
    depends_on:
      - mysql
    restart: unless-stopped

  go-test:
    image: golang:1.26-bookworm
    working_dir: /app
    command: ["sleep", "infinity"]
    env_file: ./backend/.env.test
    secrets:
      - mysql_user
      - mysql_user_password
      - admin_basic_auth_user
      - admin_basic_auth_pass
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./backend/:/app/
      - go_test_modcache:/go/pkg/mod/
      - go_test_gocache:/root/.cache/go-build/
    networks:
      - private
      - egress
    depends_on:
      - mysql-test
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/mysql_root_password
      MYSQL_USER_FILE: /run/secrets/mysql_user
      MYSQL_PASSWORD_FILE: /run/secrets/mysql_user_password
      MYSQL_DATABASE: blog
    command: ["mysqld", "--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    secrets:
      - mysql_root_password
      - mysql_user
      - mysql_user_password
    security_opt:
      - no-new-privileges:true
    volumes:
      - mysql_data:/var/lib/mysql/
    networks:
      - private
    restart: unless-stopped

  mysql-test:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/mysql_root_password
      MYSQL_USER_FILE: /run/secrets/mysql_user
      MYSQL_PASSWORD_FILE: /run/secrets/mysql_user_password
      MYSQL_DATABASE: blog-test
    command: ["mysqld", "--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    secrets:
      - mysql_root_password
      - mysql_user
      - mysql_user_password
    security_opt:
      - no-new-privileges:true
    volumes:
      - mysql_test_data:/var/lib/mysql/
    networks:
      - private
    restart: unless-stopped

  vite-dev:
    image: node:25-bookworm-slim
    working_dir: /app
    command: ["bash", "-lc", "if [ ! -x node_modules/.bin/vite ]; then npm ci; fi && npm run vite-dev"]
    volumes:
      - ./frontend/:/app/
      - node_modules:/app/node_modules/
    security_opt:
      - no-new-privileges:true
    read_only: true
    networks:
      - private
    restart: unless-stopped

networks:
  private:
    internal: true
  egress:

volumes:
  go_test_modcache:
  go_test_gocache:
  go_test_gotmp:
  mysql_data:
  mysql_test_data:
  node_modules:

secrets:
  admin_basic_auth_user:
    file: ./secrets/dev/admin_basic_auth_user
  admin_basic_auth_pass:
    file: ./secrets/dev/admin_basic_auth_pass
  mysql_root_password:
    file: ./secrets/dev/mysql_root_password
  mysql_user:
    file: ./secrets/dev/mysql_user
  mysql_user_password:
    file: ./secrets/dev/mysql_user_password
