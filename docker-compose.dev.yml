services:
  nginx:
    image: nginx:1.27-alpine
    user: "nginx:nginx"
    volumes:
      - ./nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/snippets/:/etc/nginx/snippets/:ro
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /run/:rw,uid=101,gid=101,mode=0755
      - /var/cache/nginx/:rw,uid=101,gid=101,mode=0755
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - private
      - egress
    depends_on:
      - go
      - vite-dev
      - ssr
    restart: unless-stopped

  go:
    build:
      context: ./backend/
      dockerfile: ./Dockerfile
    env_file: ./backend/.env.dev
    secrets:
      - admin_basic_auth_user
      - admin_basic_auth_pass
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    networks:
      - private
    restart: unless-stopped

  vite-dev:
    image: node:25-bookworm-slim
    working_dir: /app
    command: ["bash", "-lc", "if [ ! -x node_modules/.bin/vite ]; then npm ci; fi && npm run vite-dev"]
    volumes:
      - ./frontend/:/app/
      - node_modules:/app/node_modules/
    security_opt:
      - no-new-privileges:true
    read_only: true
    networks:
      - private
    restart: unless-stopped

  ssr:
    build:
      context: ./frontend/
      dockerfile: ./Dockerfile.ssr.dev
    env_file: ./frontend/.env
    volumes:
      - ./frontend/:/app/
      - node_modules:/app/node_modules/
      - ssr_dist:/app/dist/
    security_opt:
      - no-new-privileges:true
    read_only: true
    networks:
      - private
    restart: unless-stopped

networks:
  private:
    internal: true
  egress:

volumes:
  node_modules:
  ssr_dist:

secrets:
  admin_basic_auth_user:
    file: ./secrets/admin_basic_auth_user
  admin_basic_auth_pass:
    file: ./secrets/admin_basic_auth_pass
